<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#42a5f5"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- QR Finder patterns (the 3 corner squares) -->
  <!-- Top-left finder -->
  <rect x="68" y="68" width="130" height="130" rx="20" fill="white"/>
  <rect x="92" y="92" width="82" height="82" rx="12" fill="url(#bg)"/>
  <rect x="110" y="110" width="46" height="46" rx="8" fill="white"/>

  <!-- Top-right finder -->
  <rect x="314" y="68" width="130" height="130" rx="20" fill="white"/>
  <rect x="338" y="92" width="82" height="82" rx="12" fill="url(#bg)"/>
  <rect x="356" y="110" width="46" height="46" rx="8" fill="white"/>

  <!-- Bottom-left finder -->
  <rect x="68" y="314" width="130" height="130" rx="20" fill="white"/>
  <rect x="92" y="338" width="82" height="82" rx="12" fill="url(#bg)"/>
  <rect x="110" y="356" width="46" height="46" rx="8" fill="white"/>

  <!-- Data dots — stylized small squares -->
  <rect x="232" y="80"  width="40" height="40" rx="8" fill="white" opacity="0.9"/>
  <rect x="232" y="148" width="40" height="40" rx="8" fill="white" opacity="0.7"/>
  <rect x="232" y="236" width="40" height="40" rx="8" fill="white" opacity="0.9"/>

  <rect x="80"  y="232" width="40" height="40" rx="8" fill="white" opacity="0.7"/>
  <rect x="148" y="232" width="40" height="40" rx="8" fill="white" opacity="0.9"/>

  <rect x="324" y="236" width="40" height="40" rx="8" fill="white" opacity="0.7"/>
  <rect x="392" y="236" width="40" height="40" rx="8" fill="white" opacity="0.9"/>

  <rect x="232" y="324" width="40" height="40" rx="8" fill="white" opacity="0.9"/>
  <rect x="232" y="392" width="40" height="40" rx="8" fill="white" opacity="0.7"/>

  <!-- Bottom-right area: small accent dots -->
  <rect x="324" y="324" width="40" height="40" rx="8" fill="white" opacity="0.85"/>
  <rect x="392" y="324" width="40" height="40" rx="8" fill="white" opacity="0.6"/>
  <rect x="324" y="392" width="40" height="40" rx="8" fill="white" opacity="0.6"/>
  <rect x="392" y="392" width="40" height="40" rx="8" fill="white" opacity="0.85"/>
  <rect x="358" y="358" width="40" height="40" rx="8" fill="white" opacity="0.45"/>

</svg>